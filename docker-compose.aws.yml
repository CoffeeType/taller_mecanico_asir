# Stack orientado a EC2 + Docker Compose en AWS.
# - Sin bind-mount del codigo completo (imagen build ./).
# - MySQL y exporters NO expuestos al host; solo red Docker interna.
# - Prometheus / Grafana / Alertmanager solo en loopback y bajo profile "monitoring".
#
# Uso: docker compose -f docker-compose.aws.yml --env-file .env up -d
# Ver docs/AWS_DOCKER_DEPLOYMENT.md

services:
  web:
    build: .
    cpus: "${WEB_CPUS:-0.75}"
    mem_limit: "${WEB_MEM_LIMIT:-512m}"
    memswap_limit: "${WEB_MEMSWAP_LIMIT:-768m}"
    ports:
      - "${WEB_HOST_PORT:-80}:80"
    volumes:
      - app_images:/var/www/html/assets/images
      - app_logs:/var/www/html/logs
      - app_cache:/var/www/html/cache
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-trabajo_final_php}
      - DB_USER=${MYSQL_USER:-app_user}
      - DB_PASS=${MYSQL_PASSWORD:-app_password}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    cpus: "${MYSQL_CPUS:-0.75}"
    mem_limit: "${MYSQL_MEM_LIMIT:-768m}"
    memswap_limit: "${MYSQL_MEMSWAP_LIMIT:-1024m}"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-trabajo_final_php}
      - MYSQL_USER=${MYSQL_USER:-app_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-app_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  prometheus:
    image: prom/prometheus:v3.11.3
    profiles:
      - monitoring
    cpus: "${PROMETHEUS_CPUS:-0.35}"
    mem_limit: "${PROMETHEUS_MEM_LIMIT:-384m}"
    memswap_limit: "${PROMETHEUS_MEMSWAP_LIMIT:-512m}"
    volumes:
      - ./monitoring/prometheus/prometheus.aws.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-512MB}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped
    depends_on:
      - alertmanager
      - blackbox-exporter
    networks:
      - app-network
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"

  alertmanager:
    image: prom/alertmanager:v0.32.1
    profiles:
      - monitoring
    cpus: "${ALERTMANAGER_CPUS:-0.15}"
    mem_limit: "${ALERTMANAGER_MEM_LIMIT:-128m}"
    memswap_limit: "${ALERTMANAGER_MEMSWAP_LIMIT:-192m}"
    volumes:
      # Must match path expected by alertmanager-entrypoint.sh (`/etc/alertmanager/config/alertmanager.yml`)
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/config/alertmanager.yml:ro
      - ./monitoring/alertmanager/alertmanager-entrypoint.sh:/entrypoint.sh:ro
      - alertmanager_data:/alertmanager
    environment:
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - SMTP_SMARTHOST=${SMTP_SMARTHOST:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_AUTH_USERNAME=${SMTP_AUTH_USERNAME:-}
      - SMTP_AUTH_PASSWORD=${SMTP_AUTH_PASSWORD:-}
      - SMTP_REQUIRE_TLS=${SMTP_REQUIRE_TLS:-true}
    entrypoint:
      - /bin/sh
      - -c
      - "sed 's/\\r$//' /entrypoint.sh > /tmp/entrypoint.sh && chmod +x /tmp/entrypoint.sh && /tmp/entrypoint.sh"
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-9093}:9093"

  grafana:
    image: grafana/grafana:13.0.1
    profiles:
      - monitoring
    cpus: "${GRAFANA_CPUS:-0.35}"
    mem_limit: "${GRAFANA_MEM_LIMIT:-384m}"
    memswap_limit: "${GRAFANA_MEMSWAP_LIMIT:-512m}"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"

  node-exporter:
    image: prom/node-exporter:v1.11.1
    profiles:
      - monitoring
    cpus: "${NODE_EXPORTER_CPUS:-0.10}"
    mem_limit: "${NODE_EXPORTER_MEM_LIMIT:-96m}"
    memswap_limit: "${NODE_EXPORTER_MEMSWAP_LIMIT:-128m}"
    restart: unless-stopped
    networks:
      - app-network

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.19.0
    profiles:
      - monitoring
    cpus: "${MYSQLD_EXPORTER_CPUS:-0.15}"
    mem_limit: "${MYSQLD_EXPORTER_MEM_LIMIT:-128m}"
    memswap_limit: "${MYSQLD_EXPORTER_MEMSWAP_LIMIT:-192m}"
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-app_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-app_password}
    volumes:
      - ./monitoring/mysqld_exporter/entrypoint.sh:/entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - "sed 's/\\r$//' /entrypoint.sh > /tmp/entrypoint.sh && chmod +x /tmp/entrypoint.sh && /bin/sh /tmp/entrypoint.sh"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.26.0
    profiles:
      - monitoring
    cpus: "${BLACKBOX_EXPORTER_CPUS:-0.10}"
    mem_limit: "${BLACKBOX_EXPORTER_MEM_LIMIT:-96m}"
    memswap_limit: "${BLACKBOX_EXPORTER_MEMSWAP_LIMIT:-128m}"
    command:
      - '--config.file=/config/blackbox.yml'
    volumes:
      - ./monitoring/prometheus/blackbox.yml:/config/blackbox.yml:ro
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  app_images:
  app_logs:
  app_cache:

networks:
  app-network:
    driver: bridge

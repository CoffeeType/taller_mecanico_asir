name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-aws-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
      AWS_EC2_USER: ${{ secrets.AWS_EC2_USER }}
      AWS_EC2_SSH_PORT: ${{ secrets.AWS_EC2_SSH_PORT }}
      # Opcional: ruta del clon en la EC2 (por defecto /opt/taller_mecanico_asir).
      AWS_EC2_PROJECT_DIR: ${{ secrets.AWS_EC2_PROJECT_DIR }}
      # Opcional: rama a desplegar (por defecto main).
      AWS_EC2_GIT_BRANCH: ${{ secrets.AWS_EC2_GIT_BRANCH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker builds
        run: |
          chmod +x ./scripts/verify-builds.sh
          ./scripts/verify-builds.sh

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${AWS_EC2_HOST:?missing secret AWS_EC2_HOST}"
          : "${AWS_EC2_USER:?missing secret AWS_EC2_USER}"
          : "${SSH_KEY:?missing secret AWS_EC2_SSH_KEY}"
          PORT="${AWS_EC2_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$AWS_EC2_HOST" >> ~/.ssh/known_hosts

      - name: Pull and redeploy on EC2
        env:
          DEPLOY_PATH: ${{ env.AWS_EC2_PROJECT_DIR }}
          GIT_BRANCH: ${{ env.AWS_EC2_GIT_BRANCH }}
        run: |
          set -euo pipefail
          PORT="${AWS_EC2_SSH_PORT:-22}"
          REMOTE="${AWS_EC2_USER}@${AWS_EC2_HOST}"
          PROJECT_DIR="${DEPLOY_PATH:-/opt/taller_mecanico_asir}"
          BRANCH="${GIT_BRANCH:-main}"

          echo "==> EC2 deploy: ${REMOTE} (port ${PORT})"
          echo "==> Ruta en servidor: ${PROJECT_DIR}  rama: ${BRANCH}"

          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "$REMOTE" bash -s <<REMOTE_EOF
          set -euo pipefail
          DEPLOY_ROOT='${PROJECT_DIR}'
          GIT_REF='${BRANCH}'

          echo "==> [EC2] usuario: \$(id -un)  cwd antes: \$(pwd 2>/dev/null || true)"
          if [ ! -d "\$DEPLOY_ROOT" ]; then
            echo "::error::No existe el directorio de despliegue: \$DEPLOY_ROOT"
            echo "Crea el clon en esa ruta (ver docs/AWS_DOCKER_DEPLOYMENT.md) o define el secret AWS_EC2_PROJECT_DIR."
            ls -la "\$(dirname "\$DEPLOY_ROOT")" 2>/dev/null || true
            exit 1
          fi
          cd "\$DEPLOY_ROOT"
          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            echo "::error::\$DEPLOY_ROOT no es un repositorio git."
            exit 1
          fi

          echo "==> [EC2] remoto origin: \$(git remote get-url origin 2>/dev/null || echo '(sin origin)')"
          echo "==> [EC2] rama actual antes de fetch: \$(git branch --show-current 2>/dev/null || true)"

          git fetch origin
          git checkout "\$GIT_REF"
          if ! git pull --ff-only "origin" "\$GIT_REF"; then
            echo "::error::git pull --ff-only fallo. En la EC2: cd \$DEPLOY_ROOT && git status"
            exit 1
          fi

          chmod +x scripts/deploy_aws_docker.sh
          exec ./scripts/deploy_aws_docker.sh
          REMOTE_EOF

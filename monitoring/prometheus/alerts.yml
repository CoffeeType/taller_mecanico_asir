groups:
  - name: application_alerts
    interval: 30s
    rules:
      # Métricas PHP/log-derived: usar increase + tráfico mínimo; filtrar source=app (no simulador).
      - alert: ApplicationMetricsDown
        expr: up{job="php-app"} == 0
        for: 2m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Endpoint de métricas de la aplicación no scrapeable"
          description: "Prometheus no puede scrapear `php-app` (/metrics.php). Revisa contenedor `web` y red."

      - alert: HighApp5xxRate
        expr: |
          (
            sum(increase(app_http_requests_total{source="app",status=~"5.."}[15m]))
            /
            clamp_min(sum(increase(app_http_requests_total{source="app"}[15m])), 1)
          ) > 0.05
          and on()
          sum(increase(app_http_requests_total{source="app"}[15m])) > 15
        for: 10m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "Alta tasa de errores HTTP 5xx (tráfico app)"
          description: "Ratio 5xx sobre total (15m rolling) > 5% con volumen suficiente. Valor ~{{ $value | humanizePercentage }}."

      - alert: CriticalApp5xxRate
        expr: |
          (
            sum(increase(app_http_requests_total{source="app",status=~"5.."}[15m]))
            /
            clamp_min(sum(increase(app_http_requests_total{source="app"}[15m])), 1)
          ) > 0.15
          and on()
          sum(increase(app_http_requests_total{source="app"}[15m])) > 30
        for: 5m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Tasa crítica de errores HTTP 5xx (tráfico app)"
          description: "Ratio 5xx sobre total (15m rolling) > 15% con volumen suficiente. Valor ~{{ $value | humanizePercentage }}."

      - alert: DatabaseConnectionDown
        expr: app_db_connection_healthy == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Conexión a base de datos caída"
          description: "La aplicación reporta `app_db_connection_healthy == 0`."

      # p95 viene del fichero response_time.log (aproximación); solo warning y con tráfico mínimo.
      - alert: HighAppLatencyP95
        expr: |
          app_http_response_time_seconds{quantile="0.95"} > 2
          and on()
          sum(increase(app_http_requests_total{source="app"}[15m])) > 10
        for: 10m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "Tiempo de respuesta alto (p95 aproximado desde logs)"
          description: "p95 > 2s según métricas derivadas de logs. Valor {{ $value }}s."

  - name: database_alerts
    interval: 30s
    rules:
      - alert: MySQLConnectionsExhausted
        expr: |
          (mysql_global_status_threads_connected / mysql_global_variables_max_connections) > 0.8
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Conexiones MySQL altas"
          description: "Ratio conexiones/max_connections > 80% (valor ratio {{ $value | humanizePercentage }})."

      - alert: MySQLConnectionsCritical
        expr: |
          (mysql_global_status_threads_connected / mysql_global_variables_max_connections) > 0.95
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Conexiones MySQL críticas"
          description: "Ratio conexiones/max_connections > 95% (valor ratio {{ $value | humanizePercentage }})."

      - alert: MySQLSlowQueries
        expr: |
          rate(mysql_global_status_slow_queries[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Alto número de consultas lentas en MySQL"
          description: "Consultas lentas/s > 10 (valor {{ $value }})."

      - alert: MySQLDown
        expr: |
          up{job="mysqld-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "MySQL exporter no disponible"
          description: "El job `mysqld-exporter` no responde al scrape."

  - name: system_alerts
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Uso alto de CPU"
          description: "CPU > 80% (valor {{ $value | humanize }}%)."

      - alert: CriticalCPUUsage
        expr: |
          100 - (avg(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Uso crítico de CPU"
          description: "CPU > 95% (valor {{ $value | humanize }}%)."

      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          /
          node_memory_MemTotal_bytes
          > 0.85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Uso alto de memoria"
          description: "Memoria > 85% (valor {{ $value | humanizePercentage }})."

      - alert: CriticalMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          /
          node_memory_MemTotal_bytes
          > 0.95
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Uso crítico de memoria"
          description: "Memoria > 95% (valor {{ $value | humanizePercentage }})."

      # Excluir fs efímeros; monitorizar root `/` en Linux típico.
      - alert: LowDiskSpace
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|fuse\\.lxcfs|squashfs|vfat|ramfs",mountpoint="/"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|fuse\\.lxcfs|squashfs|vfat|ramfs",mountpoint="/"}
          ) < 0.15
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Espacio en disco bajo (/)"
          description: "Libre en `/` < 15% (valor {{ $value | humanizePercentage }})."

      - alert: CriticalDiskSpace
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|fuse\\.lxcfs|squashfs|vfat|ramfs",mountpoint="/"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|fuse\\.lxcfs|squashfs|vfat|ramfs",mountpoint="/"}
          ) < 0.05
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Espacio en disco crítico (/)"
          description: "Libre en `/` < 5% (valor {{ $value | humanizePercentage }})."

      - alert: NodeExporterDown
        expr: |
          up{job="node-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Node Exporter no disponible"
          description: "El job `node-exporter` no responde al scrape."

  - name: monitoring_alerts
    interval: 30s
    rules:
      - alert: PrometheusDown
        expr: |
          up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "Prometheus no disponible"
          description: "El job `prometheus` no responde al scrape."

      - alert: CadvisorDown
        expr: up{job="cadvisor"} == 0
        for: 5m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "cAdvisor no scrapeable"
          description: "El target `cadvisor` está caído o no accesible desde Prometheus."

      - alert: TelegrafDown
        expr: up{job="telegraf"} == 0
        for: 5m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "Telegraf no scrapeable"
          description: "El target `telegraf` está caído o no accesible desde Prometheus."

      - alert: BlackboxExporterDown
        expr: up{job="blackbox-exporter"} == 0
        for: 2m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "Blackbox exporter no disponible"
          description: "No se pueden ejecutar probes HTTP sintéticos."

      - alert: BlackboxProbeFailed
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Fallo probe HTTP sintético"
          description: "Probe fallido para {{ $labels.instance }}. Revisar app y Apache."
